sonar.projectKey=pooja-platform
sonar.projectName=Pooja Platform
sonar.projectVersion=1.0.0
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=api-gateway/src/main,user-auth-service/src/main,product-service/src/main,pandit-service/src/main,order-service/src/main,rag-ai-service/src/main,payment-service/src/main,notification-service/src/main
sonar.tests=api-gateway/src/test,user-auth-service/src/test,product-service/src/test,pandit-service/src/test,order-service/src/test

# Coverage
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/test/jacocoTestReport.xml

# Exclusions
sonar.exclusions=**/build/**,**/frontend/**,**/node_modules/**,**/*.js,**/*.css
sonar.kotlin.file.suffixes=.kt
