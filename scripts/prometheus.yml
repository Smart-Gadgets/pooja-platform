global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'user-auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-auth-service:8081']

  - job_name: 'product-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['product-service:8082']

  - job_name: 'pandit-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['pandit-service:8083']

  - job_name: 'order-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order-service:8084']

  - job_name: 'rag-ai-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['rag-ai-service:8085']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8086']

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8087']
