name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - config-service
          - gateway-service
          - user-auth-service
          - product-service
          - pandit-service
          - booking-order-service
          - rag-ai-service
          - notification-service
          - payment-service
          - content-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build & Test
        run: ./gradlew :${{ matrix.service }}:build -x test

      - name: Run Tests
        run: ./gradlew :${{ matrix.service }}:test
        continue-on-error: true

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          cd ${{ matrix.service }}
          docker build -f Dockerfile.standalone -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} .
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: |
          echo "Deploy step - configure kubectl and apply manifests"
          # kubectl apply -f k8s/namespace.yml
          # kubectl apply -f k8s/infra/
          # kubectl apply -f k8s/services/
