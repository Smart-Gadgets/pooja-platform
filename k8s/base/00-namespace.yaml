apiVersion: v1
kind: Namespace
metadata:
  name: pooja-platform
  labels:
    app.kubernetes.io/part-of: pooja-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pooja-config
  namespace: pooja-platform
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: pooja_db
  DB_USER: pooja
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: kafka:9092
---
apiVersion: v1
kind: Secret
metadata:
  name: pooja-secrets
  namespace: pooja-platform
type: Opaque
stringData:
  DB_PASSWORD: pooja_secret
  JWT_SECRET: pooja-platform-super-secret-key-change-in-production-minimum-256-bits-long
  OPENAI_API_KEY: sk-placeholder-replace-with-real-key
  RAZORPAY_KEY_ID: rzp_test_placeholder
  RAZORPAY_KEY_SECRET: placeholder_secret
