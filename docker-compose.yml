x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: pooja_db
  DB_USER: pooja
  DB_PASSWORD: pooja_secret
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: kafka:29092
  JWT_SECRET: pooja-platform-super-secret-key-change-in-production-minimum-256-bits-long

services:
  # ===================== INFRASTRUCTURE =====================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: pooja-postgres
    environment:
      POSTGRES_DB: pooja_db
      POSTGRES_USER: pooja
      POSTGRES_PASSWORD: pooja_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pooja -d pooja_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pooja-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pooja-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pooja-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===================== SERVICES =====================

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: pooja-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  user-auth-service:
    build:
      context: .
      dockerfile: user-auth-service/Dockerfile
    container_name: pooja-auth
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: pooja-product
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  pandit-service:
    build:
      context: .
      dockerfile: pandit-service/Dockerfile
    container_name: pooja-pandit
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: pooja-order
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  rag-ai-service:
    build:
      context: .
      dockerfile: rag-ai-service/Dockerfile
    container_name: pooja-rag
    ports:
      - "8085:8085"
    environment:
      <<: *common-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: pooja-payment
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: pooja-notification
    ports:
      - "8087:8087"
    environment:
      <<: *common-env
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ===================== FRONTEND =====================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: pooja-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NODE_ENV: production
    depends_on:
      - api-gateway
    restart: on-failure

  # ===================== OBSERVABILITY =====================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pooja-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.0
    container_name: pooja-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
